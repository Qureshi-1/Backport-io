[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
ignore = [
    "E402",  # module-import-not-at-top-of-file (intentional in some files)
    "E711",  # none-comparison (SQLAlchemy pattern)
    "E712",  # true-false-comparison (SQLAlchemy pattern)
    "E741",  # ambiguous-variable-name
    "E701",  # multiple-statements-on-one-line-colon (style preference)
]

[tool.ruff.lint.per-file-ignores]
"tests/*.py" = ["F841"]  # unused-variable in tests is ok
