# Alembic Configuration for Backport-io
# ──────────────────────────────────────────────────────────────────────────────

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# File template for generated migration files — includes a timestamp prefix
# Example: 20250101_0930_a1b2c3d4e5f6_create_users_table.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Set to 'true' to run the environment during the 'revision' command, regardless
# of autogenerate.
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file to be
# detected as revisions in the versions directory.
# sourceless = false

# The version location specification — leave as default
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# The output encoding used when revision files are written from script.py.mako.
# output_encoding = utf-8

# The database URL is NOT set here. It is read from the environment variable
# DATABASE_URL at runtime (see env.py). This placeholder keeps Alembic happy.
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
