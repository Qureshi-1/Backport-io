<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080C10"/>
      <stop offset="100%" style="stop-color:#0D131A"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2CE8C3"/>
      <stop offset="100%" style="stop-color:#6BA9FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(162,189,219,0.15)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Mint glow circle -->
  <circle cx="200" cy="315" r="300" fill="rgba(44,232,195,0.04)"/>
  <circle cx="950" cy="200" r="250" fill="rgba(107,169,255,0.03)"/>

  <!-- Shield icon -->
  <g transform="translate(100, 140)" filter="url(#glow)">
    <path d="M80 20 L140 0 L200 20 L200 90 C200 130 140 170 140 170 C140 170 80 130 80 90 Z"
          fill="none" stroke="#2CE8C3" stroke-width="3" opacity="0.8"/>
    <path d="M120 85 L135 100 L165 65"
          fill="none" stroke="#2CE8C3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="100" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">Backport</text>

  <!-- Subtitle -->
  <text x="100" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#A2BDDB" opacity="0.8">The Final Layer of Your API Infrastructure</text>

  <!-- Feature pills -->
  <rect x="100" y="470" width="110" height="32" rx="16" fill="rgba(44,232,195,0.1)" stroke="rgba(44,232,195,0.3)" stroke-width="1"/>
  <text x="155" y="491" font-family="system-ui, sans-serif" font-size="13" fill="#2CE8C3" text-anchor="middle" font-weight="600">WAF</text>

  <rect x="225" y="470" width="150" height="32" rx="16" fill="rgba(107,169,255,0.1)" stroke="rgba(107,169,255,0.3)" stroke-width="1"/>
  <text x="300" y="491" font-family="system-ui, sans-serif" font-size="13" fill="#6BA9FF" text-anchor="middle" font-weight="600">Rate Limiting</text>

  <rect x="390" y="470" width="80" height="32" rx="16" fill="rgba(44,232,195,0.1)" stroke="rgba(44,232,195,0.3)" stroke-width="1"/>
  <text x="430" y="491" font-family="system-ui, sans-serif" font-size="13" fill="#2CE8C3" text-anchor="middle" font-weight="600">Cache</text>

  <rect x="485" y="470" width="160" height="32" rx="16" fill="rgba(107,169,255,0.1)" stroke="rgba(107,169,255,0.3)" stroke-width="1"/>
  <text x="565" y="491" font-family="system-ui, sans-serif" font-size="13" fill="#6BA9FF" text-anchor="middle" font-weight="600">Transformations</text>

  <!-- Terminal window (right side) -->
  <g transform="translate(650, 80)">
    <rect width="500" height="320" rx="12" fill="#0D1117" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Window bar -->
    <rect width="500" height="36" rx="12" fill="rgba(255,255,255,0.02)"/>
    <rect y="24" width="500" height="12" fill="rgba(255,255,255,0.02)"/>
    <circle cx="20" cy="18" r="6" fill="#EF4444" opacity="0.4"/>
    <circle cx="40" cy="18" r="6" fill="#FBBF24" opacity="0.4"/>
    <circle cx="60" cy="18" r="6" fill="#2CE8C3" opacity="0.4"/>
    <text x="200" y="22" font-family="monospace" font-size="11" fill="rgba(162,189,219,0.3)" text-anchor="middle">backport-proxy</text>

    <!-- Request -->
    <text x="20" y="70" font-family="monospace" font-size="14" fill="#c792ea" font-weight="bold">GET</text>
    <text x="65" y="70" font-family="monospace" font-size="14" fill="#2CE8C3">/api/users?id=1' OR '1'='1' --</text>
    <text x="20" y="95" font-family="monospace" font-size="12" fill="rgba(162,189,219,0.4)">X-API-Key: bk_live_••••••••••</text>

    <!-- Response box -->
    <rect x="16" y="120" width="468" height="90" rx="8" fill="rgba(239,68,68,0.05)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
    <text x="32" y="148" font-family="monospace" font-size="13" fill="#EF4444" font-weight="bold">⚠ 403 Forbidden</text>
    <text x="32" y="172" font-family="monospace" font-size="12" fill="rgba(162,189,219,0.5)">Rule: SQL Injection Pattern Detected</text>
    <text x="32" y="196" font-family="monospace" font-size="11" fill="rgba(162,189,219,0.3)">Response time: 3ms</text>

    <!-- Stats row -->
    <rect x="16" y="228" width="110" height="60" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="71" y="256" font-family="monospace" font-size="22" fill="#2CE8C3" text-anchor="middle" font-weight="bold">12ms</text>
    <text x="71" y="276" font-family="monospace" font-size="10" fill="rgba(162,189,219,0.4)" text-anchor="middle">AVG LATENCY</text>

    <rect x="142" y="228" width="110" height="60" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="197" y="256" font-family="monospace" font-size="22" fill="#6BA9FF" text-anchor="middle" font-weight="bold">99.9%</text>
    <text x="197" y="276" font-family="monospace" font-size="10" fill="rgba(162,189,219,0.4)" text-anchor="middle">UPTIME</text>

    <rect x="268" y="228" width="110" height="60" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="323" y="256" font-family="monospace" font-size="22" fill="#EF4444" text-anchor="middle" font-weight="bold">412</text>
    <text x="323" y="276" font-family="monospace" font-size="10" fill="rgba(162,189,219,0.4)" text-anchor="middle">THREATS BLOCKED</text>

    <!-- Mini chart -->
    <rect x="394" y="228" width="90" height="60" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <polyline points="404,275 420,260 436,268 452,250 468,255" fill="none" stroke="#2CE8C3" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Bottom tagline -->
  <text x="100" y="555" font-family="system-ui, sans-serif" font-size="15" fill="rgba(162,189,219,0.4)">Open Source  ·  MIT License  ·  No SDK Required  ·  30 Second Setup</text>

  <!-- Gradient line -->
  <rect x="100" y="580" width="200" height="3" rx="1.5" fill="url(#mintGrad)" opacity="0.6"/>

  <!-- URL -->
  <text x="100" y="610" font-family="monospace" font-size="13" fill="rgba(162,189,219,0.25)">backport.in</text>
</svg>
