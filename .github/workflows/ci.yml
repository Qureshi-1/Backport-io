name: CI

on:
  push:
    branches: [main]
  pull_request:
    # Run on all PRs regardless of target branch
  workflow_call:
    # Allow this workflow to be called by deploy workflows
    

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Backend Lint
  # ──────────────────────────────────────────────
  backend-lint:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint check
        run: ruff check .

  # ──────────────────────────────────────────────
  # Backend Tests
  # ──────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  # ──────────────────────────────────────────────
  # Frontend Lint & Build
  # ──────────────────────────────────────────────
  frontend-checks:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # ──────────────────────────────────────────────
  # CLI Build
  # ──────────────────────────────────────────────
  cli-build:
    name: CLI Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────
  # CI Gate — all checks must pass
  # ──────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    if: always()
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-tests, frontend-checks, cli-build]
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.backend-lint.result }}" != "success" || \
                "${{ needs.backend-tests.result }}" != "success" || \
                "${{ needs.frontend-checks.result }}" != "success" || \
                "${{ needs.cli-build.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            echo "  backend-lint:    ${{ needs.backend-lint.result }}"
            echo "  backend-tests:   ${{ needs.backend-tests.result }}"
            echo "  frontend-checks: ${{ needs.frontend-checks.result }}"
            echo "  cli-build:       ${{ needs.cli-build.result }}"
            exit 1
          fi
          echo "All CI checks passed!"
