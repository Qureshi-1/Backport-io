name: Bug Report
description: Report a reproducible bug or unexpected behavior
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report

        Thanks for taking the time to report this issue. Please fill in the details below so we can reproduce and fix it as quickly as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I navigate to /dashboard and click 'Create Key', the page throws a 500 error..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Numbered steps to reproduce the behavior.
      placeholder: |
        1. Navigate to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The API key should be created and displayed in the table.

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
      placeholder: A 500 Internal Server Error is returned with no useful message.

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of the system is affected?
      options:
        - Frontend (Dashboard UI)
        - Backend (API Gateway)
        - CLI Tool
        - WAF Engine
        - Rate Limiting
        - Caching
        - Authentication
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Backport are you running?
      placeholder: "e.g., 1.2.0, main branch, commit SHA"

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you running Backport?
      options:
        - Local Development
        - Vercel (Frontend)
        - Render (Backend)
        - Docker
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., macOS 14, Ubuntu 22.04, Windows 11"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant error logs, stack traces, or console output.
      placeholder: |
        ```
        Paste logs here
        ```

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots if they help explain the issue. Drag and drop or paste images here.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (e.g., browser, network conditions, related issues).
