name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        We appreciate you taking the time to suggest a new feature. Please describe your idea in detail below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What limitation are you facing?
      placeholder: "Currently, Backport does not support X, which means users cannot..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see implemented.
      placeholder: "Add support for X by implementing Y, which would allow users to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: "I've tried using Z as a workaround, but it doesn't fully solve the problem because..."

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which area of the product does this relate to?
      options:
        - Security (WAF, Auth)
        - Performance (Caching, Rate Limiting)
        - Observability (Analytics, Logs, Health)
        - Developer Experience (Dashboard, CLI, Mocking)
        - Integrations & Webhooks
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice to have
        - Would significantly improve my workflow
        - Blocking my use case
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Examples & References
      description: Links to similar features in other products, mockups, or API design examples.
      placeholder: "Cloudflare Workers does X this way: https://..."

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that would help us understand and evaluate this request.
