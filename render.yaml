services:
  - type: web
    name: backpack-backend
    runtime: python
    pythonVersion: "3.11.9"
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    disk:
      name: backport-db
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: "/app/data/backport.db"
      - key: SECRET_KEY
        generateValue: true
      - key: RAZORPAY_KEY_ID
        value: ""
      - key: RAZORPAY_KEY_SECRET
        value: ""
      - key: FRONTEND_URL
        value: "https://backport-io.vercel.app"
      - key: CORS_ORIGINS
        value: "https://backport-io.vercel.app,https://backport-io.vercel.app"
